        .media-container { width: 100%; background: #000; position: relative; line-height: 0; }
        .video-wrapper { display: none; width: 100%; aspect-ratio: 16 / 9; background: #000; position: relative; }
        .video-wrapper iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        .poster-wrapper { padding: 3rem 1.5rem 1.5rem; display: flex; justify-content: center; }
        .poster-wrapper img { width: 100%; max-width: 260px; border-radius: 12px; }

        .modal-content-container { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .watch-now-btn { background-color: var(--dune-button-bg); color: white; font-weight: bold; padding: 14px; border-radius: 30px; border: none; width: 100%; cursor: pointer; }
        .ad-banner-box { display: flex; justify-content: center; margin: 10px 0; min-height: 50px; background: rgba(255,255,255,0.05); }

        footer { background: var(--surface-color); padding: 20px; text-align: center; margin-top: auto; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>

                 <div class="flex justify-center gap-4 text-gray-400 text-sm">
                     <span id="details-meta-info"></span>

                 </div>

                         </script>

                 </div>

                 <hr style="border-color: #222;">

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD-tlrPK8s9h87PVqtvprBy_phcCqONLeU",
            authDomain: "my-movie-81a4b.firebaseapp.com",
            databaseURL: "https://my-movie-81a4b-default-rtdb.firebaseio.com",
            projectId: "my-movie-81a4b",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allMovies = [];
        let currentMovie = null;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            
            // সাইট সেটিংস লোড (অ্যাপ আইকন)
            db.ref('siteSettings').on('value', snap => {
                const s = snap.val() || {};
                const appBtn = document.getElementById('header-app-button');
                if(s.appDownloadFileLink) {
                    appBtn.style.display = 'flex';
                    appBtn.onclick = () => window.open(s.appDownloadFileLink, '_blank');
                    document.getElementById('app-img').src = s.appIcon || "https://ia800509.us.archive.org/0/items/68ab-4def-1a-22d-download-prev-ui/68ab4def1a22d_download_prev_ui.png";
                }
            });

            // মুভি লোড
            db.ref('movies').on('value', snap => {
                const data = snap.val();
                if(data) {
                    allMovies = Object.entries(data).map(([key, val]) => ({
                        key, ...val,
                        slug: val.title.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_-]+/g, '-'),
                        rating: val.rating || (Math.random() * 2 + 7).toFixed(1)
                    })).reverse();
                    renderMovies(allMovies);
                    renderCategories();
                    handleUrlPath(); 
                }
                document.getElementById('loader').style.display = 'none';
            });

            // মেনু ট্রিগার
            const menuBtn = document.getElementById('menu-trigger');
            const overlay = document.getElementById('side-menu-overlay');
            menuBtn.onclick = () => overlay.classList.add('active');
            overlay.onclick = (e) => { if(e.target === overlay) overlay.classList.remove('active'); };

            // সার্চ ট্রিগার
            document.querySelector('.search-toggle-btn').onclick = () => {
                document.querySelector('.search-container').classList.toggle('active');
                document.getElementById('search-input').focus();
            };
            document.getElementById('search-input').oninput = (e) => {
                const val = e.target.value.toLowerCase();
                renderMovies(allMovies.filter(m => m.title.toLowerCase().includes(val)));
            };
        });

        function handleUrlPath() {
            const path = window.location.pathname.substring(1);
            if (path && path !== "" && path !== "index.html") {
                const movie = allMovies.find(m => m.slug === path);
                if (movie) openModal(movie);
            }
        }

        function openModal(movie) {
            currentMovie = movie;
            history.pushState({ movieId: movie.key }, movie.title, `/${movie.slug}`);
            document.title = `${movie.title} - CineStream`;

            document.getElementById('movie-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            document.getElementById('modal-poster-wrapper').style.display = 'flex';
            document.getElementById('modal-video-wrapper').style.display = 'none';
            document.getElementById('modal-video-player').src = "";
            document.getElementById('watch-btn').style.display = 'block';

            document.getElementById('details-title').textContent = movie.title;
            document.getElementById('details-rating').textContent = movie.rating;
            document.getElementById('details-meta-info').textContent = `${movie.category} (${movie.releaseDate ? movie.releaseDate.substring(0,4) : '2025'})`;
            document.getElementById('details-poster-img').src = movie.image;
            document.getElementById('details-description').textContent = movie.description;
            document.getElementById('details-director').textContent = "Director: " + (movie.director || 'N/A');
            
            const castBox = document.getElementById('details-cast');
            castBox.innerHTML = "";
            if(movie.cast) movie.cast.split(',').forEach(a => castBox.innerHTML += `<span>• ${a.trim()}</span>`);

            const latestBox = document.getElementById('details-latest');
            latestBox.innerHTML = "";
            allMovies.slice(0, 6).forEach(m => {
                latestBox.innerHTML += `<div onclick="openModalByKey('${m.key}')" class="flex-shrink-0 w-24 cursor-pointer"><img src="${m.image}" class="rounded mb-1"><p class="text-[10px] text-center truncate">${m.title}</p></div>`;
            });

            document.getElementById('watch-btn').onclick = () => playVideo();
        }

        function closeModal() {
            if (window.location.pathname !== '/') history.pushState(null, "CineStream", '/');
            document.title = "CineStream - Watch & Download Latest HD Movies";
            document.getElementById('movie-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('modal-video-player').src = "";
        }

        function renderMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = "";
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<div class="movie-poster-wrapper"><img src="${m.image}" loading="lazy"></div><h3>${m.title}</h3>`;
                card.onclick = () => openModal(m);
                grid.appendChild(card);
            });
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allMovies.map(m => m.category))];
            const filterBox = document.getElementById('category-filters');
            filterBox.innerHTML = "";
            cats.forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (c === 'All' ? ' active' : '');
                btn.textContent = c;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderMovies(c === 'All' ? allMovies : allMovies.filter(m => m.category === c));
                };
                filterBox.appendChild(btn);
            });
        }

        function openModalByKey(key) {
            const m = allMovies.find(x => x.key === key);
            if(m) {
                document.getElementById('movie-modal').scrollTop = 0;
                openModal(m);
            }
        }

        function playVideo() {
            document.getElementById('modal-poster-wrapper').style.display = 'none';
            document.getElementById('watch-btn').style.display = 'none';
            document.getElementById('modal-video-wrapper').style.display = 'block';
            document.getElementById('modal-video-player').src = currentMovie.link;
        }

        window.onpopstate = () => { if (document.getElementById('movie-modal').style.display === 'block') closeModal(); };
    </script>
