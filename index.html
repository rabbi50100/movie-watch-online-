        /* --- Updated Loader --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }

        .search-toggle-btn, .menu-toggle-btn, .app-icon-btn { background-color: transparent; border: none; border-radius: 8px; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: background-color 0.2s; flex-shrink: 0; padding: 0; }

        .movie-poster-wrapper { position: relative; width: 100%; aspect-ratio: 2 / 3; }

        .menu-options { list-style: none; padding: 0; }
        .menu-options li a { display: flex; align-items: center; gap: 10px; color: var(--text-color); text-decoration: none; font-size: 1.1rem; padding: 10px; }
        
        /* --- Movie Modal & Player Frame --- */
        #movie-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--dune-bg); z-index: 1001; display: none; overflow-y: auto; }
        .modal-container { width: 100%; max-width: 600px; margin: 0 auto; color: var(--dune-text); position: relative; background-color: var(--dune-bg); min-height: 100%; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background-color: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 5001; }

<body>

                <strong>USER ID:</strong> <span id="display-user-id">Loading...</span>
            </div>

                <li><a href="#" id="menu-home-btn"><i class="fas fa-home"></i> Home</a></li>

    <div id="movie-modal">
        <div class="modal-container">
            <span class="modal-close-btn" onclick="closeModal()">&times;</span>
            <div class="media-container">
                <div class="poster-wrapper" id="modal-poster-wrapper" style="padding: 2rem; display: flex; justify-content: center;">
                    <img id="details-poster-img" style="width: 100%; max-width: 250px; border-radius: 12px;" src="">
                </div>
                <div class="video-wrapper" id="modal-video-wrapper">
                    <iframe id="modal-video-player" src="" allowfullscreen></iframe>
                </div>
            </div>

            <div class="modal-content-container">
                 <h1 id="details-title" style="font-size: 1.8rem; font-weight: bold; text-align: center;"></h1>
                 
                 <div id="random-mid-ad" onclick="triggerAd()">🚀 Click here to Claim High Speed Download Server</div>

                 <button id="main-watch-now-trigger-new" class="watch-now-btn">Watch Now</button>
                 
                 <p id="details-description" style="color: #ccc; line-height: 1.6;"></p>

    </footer>

    <script>
        const myDirectLink = "https://www.effectivegatecpm.com/hvc7d1r47?key=702b7dc6ad9c74ecf5650574dead733f";
        
        function triggerAd() {
            window.open(myDirectLink, '_blank');
        }

        // --- Requirement 1: User ID Logic ---
        function getOrCreateUserID() {
            let userId = localStorage.getItem('cine_user_id');
            if (!userId) {
                userId = 'USER-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                localStorage.setItem('cine_user_id', userId);
            }
            document.getElementById('display-user-id').textContent = userId;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyD-tlrPK8s9h87PVqtvprBy_phcCqONLeU",
            authDomain: "my-movie-81a4b.firebaseapp.com",
            databaseURL: "https://my-movie-81a4b-default-rtdb.firebaseio.com",
            projectId: "my-movie-81a4b",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const moviesRef = database.ref('movies');

        const loader = document.getElementById('loader');
        const movieGrid = document.getElementById('movie-grid');
        const modal = document.getElementById('movie-modal');
        const videoWrapper = document.getElementById('modal-video-wrapper');
        const posterWrapper = document.getElementById('modal-poster-wrapper');
        const watchNowBtn = document.getElementById('main-watch-now-trigger-new');
        const randomAdBtn = document.getElementById('random-mid-ad');
        
        let allMovies = [];
        let currentMovieData = null;

        document.addEventListener('DOMContentLoaded', () => {
            getOrCreateUserID();
            document.getElementById('current-year').textContent = new Date().getFullYear();
            loadMovies();
            setupMenu();
        });

        function loadMovies() {
            moviesRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allMovies = Object.entries(data).map(([key, val]) => ({ key, ...val })).reverse();
                    displayMovies(allMovies);
                    populateCategories();
                }
                setTimeout(() => loader.style.display = 'none', 1500); // Animation feeling
            });
        }

        function displayMovies(movies) {
            movieGrid.innerHTML = '';
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<div class="movie-poster-wrapper"><img src="${movie.image}"></div><h3>${movie.title}</h3>`;
                card.onclick = () => openModal(movie);
                movieGrid.appendChild(card);
            });
        }

        function populateCategories() {
            const categories = ['All', ...new Set(allMovies.map(m => m.category))];
            const filterContainer = document.getElementById('category-filters');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.textContent = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    displayMovies(cat === 'All' ? allMovies : allMovies.filter(m => m.category === cat));
                };
                filterContainer.appendChild(btn);
            });
        }

        function openModal(movie) {
            currentMovieData = movie;
            document.getElementById('details-title').textContent = movie.title;
            document.getElementById('details-poster-img').src = movie.image;
            document.getElementById('details-description').textContent = movie.description || 'No description available.';
            
            // Reset visibility
            posterWrapper.style.display = 'flex';
            videoWrapper.style.display = 'none';
            watchNowBtn.style.display = 'block';
            randomAdBtn.style.display = 'none'; // Initially hidden
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';

            watchNowBtn.onclick = () => {
                playVideo();
                // --- Requirement 4: Smart Ad Logic ---
                // ভিডিও শুরু হওয়ার ৩-৭ সেকেন্ডের মধ্যে র‍্যান্ডমলি অ্যাড বাটন দেখাবে
                const randomDelay = Math.floor(Math.random() * 4000) + 3000;
                setTimeout(() => {
                    randomAdBtn.style.display = 'block';
                }, randomDelay);
            };
        }

        function playVideo() {
            posterWrapper.style.display = 'none';
            watchNowBtn.style.display = 'none';
            videoWrapper.style.display = 'block';
            document.getElementById('modal-video-player').src = currentMovieData.link;
        }

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('modal-video-player').src = '';
        }

        function setupMenu() {
            const menuBtn = document.getElementById('main-menu-toggle');
            const overlay = document.getElementById('side-menu-overlay');
            menuBtn.onclick = () => overlay.classList.add('active');
            overlay.onclick = (e) => { if(e.target === overlay) overlay.classList.remove('active'); };
        }
    </script>
</body>
