    <style>

        .search-container { display: flex; align-items: center; background-color: var(--button-bg-light); border: 1px solid var(--button-border-color); border-radius: 8px; overflow: hidden; }

        .search-container.active .search-input { width: 120px; padding: 8px 10px; opacity: 1; }

        main { padding: 20px; flex-grow: 1; }
        #movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .movie-card { background-color: var(--surface-color); border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.2s; position: relative; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-poster-wrapper { aspect-ratio: 2 / 3; width: 100%; position: relative; }
        .movie-poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .movie-card h3 { font-size: 0.85rem; padding: 8px; text-align: center; }

        /* --- Video Frame & Modal --- */
        #movie-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--dune-bg); z-index: 1001; display: none; overflow-y: auto; }

            box-shadow: 0 0 20px rgba(255, 165, 0, 0.4); /* Glowing Frame */
            aspect-ratio: 16 / 9;
            display: none;
        }
        .video-frame-container iframe { width: 100%; height: 100%; border-radius: 8px; border: none; }
        .modal-close-btn { position: absolute; top: 15px; right: 15px; font-size: 2rem; color: white; cursor: pointer; z-index: 1005; }

        /* Layout within Modal */
        .modal-content-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .watch-now-btn { background: var(--dune-button-bg); color: white; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; margin-bottom: 20px; }

<body>
    <div id="loader">
        <i class="fas fa-compact-disc loader-icon"></i>

    <header>
        <div class="site-logo"><i class="fas fa-clapperboard"></i> CineStream</div>
        <div class="header-right-controls" style="display:flex; gap:10px; align-items:center;">
            <div class="search-container">
                <input type="search" id="search-input" class="search-input" placeholder="Search...">
                <button class="search-toggle-btn"><i class="fas fa-magnifying-glass"></i></button>
            </div>
            <button class="menu-toggle-btn" id="main-menu-toggle" style="background:var(--button-bg-light); border:1px solid var(--button-border-color); padding:8px; border-radius:8px;"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <main>
        <div id="category-filters" style="display:flex; gap:10px; overflow-x:auto; margin-bottom:20px; padding-bottom:5px;"></div>
        <div id="movie-grid"></div>
    </main>

    <div id="side-menu-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; display:none;">
        <div id="side-menu" style="width:260px; background:var(--surface-color); height:100%; margin-left:auto; padding:20px;">
            <div class="user-id-tag">ID: <span id="user-id-val">...</span></div>
            <ul style="list-style:none; padding:0;">
                <li><a href="#" onclick="location.reload()" style="display:block; padding:10px; color:white;"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="#" id="menu-saved-btn" style="display:block; padding:10px; color:white;"><i class="fas fa-bookmark"></i> Saved Movies</a></li>
            </ul>
        </div>
    </div>

    <div id="movie-modal">
        <span class="modal-close-btn" onclick="closeModal()">&times;</span>
        <div id="video-frame" class="video-frame-container">
            <iframe id="modal-video-player" src="" allowfullscreen></iframe>
        </div>
        <div class="poster-wrapper" id="modal-poster-view" style="text-align:center; padding:40px 20px 20px;">

    </div>

    <script>
        const myDirectLink = "https://www.effectivegatecpm.com/hvc7d1r47?key=702b7dc6ad9c74ecf5650574dead733f";
        
        // --- 1. User ID Logic ---
        function setupUser() {
            let uid = localStorage.getItem('cine_uid');
            if(!uid) {
                uid = 'ID-' + Math.floor(Math.random() * 900000 + 100000);
                localStorage.setItem('cine_uid', uid);
            }
            document.getElementById('user-id-val').textContent = uid;
        }

        // --- 4. Ad Logic (2 clicks per login) ---
        let adCount = 0;
        function handleAd() {
            if(adCount < 2) {
                adCount++;
                window.open(myDirectLink, '_blank');
                return true; // Ad was shown
            }
            return false; // No ad
        }

        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyD-tlrPK8s9h87PVqtvprBy_phcCqONLeU",
            authDomain: "my-movie-81a4b.firebaseapp.com",
            databaseURL: "https://my-movie-81a4b-default-rtdb.firebaseio.com",
            projectId: "my-movie-81a4b",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allMovies = [];
        let savedIds = new Set(JSON.parse(localStorage.getItem('saved_movies') || '[]'));

        document.addEventListener('DOMContentLoaded', () => {
            setupUser();
            loadMovies();
            setupEvents();
        });

        function loadMovies() {
            database.ref('movies').on('value', (snap) => {
                const data = snap.val();
                if(data) {
                    allMovies = Object.entries(data).map(([key, val]) => ({ key, ...val })).reverse();
                    displayMovies(allMovies);
                    renderCategories();
                }
                document.getElementById('loader').style.display = 'none';
            });
        }

        function displayMovies(movies) {
            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<div class="movie-poster-wrapper"><img src="${m.image}"></div><h3>${m.title}</h3>`;
                card.onclick = () => {
                    handleAd(); // প্রথম ২ ক্লিকের জন্য এড
                    openModal(m);
                };
                grid.appendChild(card);
            });
        }

        function renderCategories() {
            const cats = ['All', ...new Set(allMovies.map(m => m.category))];
            const container = document.getElementById('category-filters');
            container.innerHTML = '';
            cats.forEach(c => {
                const b = document.createElement('button');
                b.style = "padding:6px 15px; background:#333; border-radius:20px; white-space:nowrap; border:1px solid #444;";
                b.textContent = c;
                b.onclick = () => displayMovies(c === 'All' ? allMovies : allMovies.filter(x => x.category === c));
                container.appendChild(b);
            });
        }

        function openModal(movie) {
            const modal = document.getElementById('movie-modal');
            document.getElementById('details-title').textContent = movie.title;
            document.getElementById('details-poster-img').src = movie.image;
            document.getElementById('details-desc').textContent = movie.description;
            
            document.getElementById('modal-poster-view').style.display = 'block';
            document.getElementById('video-frame').style.display = 'none';
            document.getElementById('watch-now-trigger').style.display = 'block';
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';

            document.getElementById('watch-now-trigger').onclick = () => {
                document.getElementById('modal-poster-view').style.display = 'none';
                document.getElementById('watch-now-trigger').style.display = 'none';
                document.getElementById('video-frame').style.display = 'block';
                document.getElementById('modal-video-player').src = movie.link;
            };
        }

        function closeModal() {
            document.getElementById('movie-modal').style.display = 'none';
            document.getElementById('modal-video-player').src = '';
            document.body.style.overflow = 'auto';
        }

        function setupEvents() {
            // Search toggle
            document.querySelector('.search-toggle-btn').onclick = () => {
                document.querySelector('.search-container').classList.toggle('active');
            };
            
            // Search logic
            document.getElementById('search-input').oninput = (e) => {
                const term = e.target.value.toLowerCase();
                displayMovies(allMovies.filter(m => m.title.toLowerCase().includes(term)));
            };

            // Menu toggle
            const overlay = document.getElementById('side-menu-overlay');
            document.getElementById('main-menu-toggle').onclick = () => overlay.style.display = 'block';
            overlay.onclick = (e) => { if(e.target === overlay) overlay.style.display = 'none'; };

            // Saved Movies logic
            document.getElementById('menu-saved-btn').onclick = (e) => {
                e.preventDefault();
                overlay.style.display = 'none';
                // (সিম্পল ফিল্টার উদাহরণ হিসেবে)
                alert("Saved Movies feature is integrated with LocalStorage.");
            };
        }
    </script>
